name: network-mcp-lab
prefix: ""

topology:
  kinds:
    ceos:
      image: ceos:4.32.0F

  nodes:
    r1:
      kind: ceos
      ports:
        - 2201:22
        - 8080:80

    r2:
      kind: ceos
      ports:
        - 2202:22
        - 8081:80

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]
    - endpoints: ["r1:eth2", "r2:eth2"]
    - endpoints: ["r1:eth3", "r2:eth3"]
